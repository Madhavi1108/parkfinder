version: "3.9"

services:
  # ─────────────────────────────────────────────
  # MongoDB — local database
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: parkfinder-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — Express API
  # ─────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: parkfinder-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/parkfinder
    env_file:
      - ./server/.env          # Overrides above; add JWT_SECRET, ADMIN_SECRET, SMTP_* here
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app          # Mount source for hot reloading via nodemon
      - /app/node_modules      # Preserve container node_modules (prevents host override)
    networks:
      - parkfinder-network

  # ─────────────────────────────────────────────
  # Frontend — React / Vite dev server
  # ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: parkfinder-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
    env_file:
      - ./client/.env          # Optional; VITE_* vars
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app          # Mount source for hot reloading via Vite HMR
      - /app/node_modules      # Preserve container node_modules
    networks:
      - parkfinder-network

volumes:
  mongo_data:

networks:
  parkfinder-network:
    driver: bridge
